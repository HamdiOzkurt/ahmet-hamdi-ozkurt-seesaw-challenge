<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Seesaw Simulation</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="scene">
  
    <h1>Seesaw Simulation</h1>
  
    <div id="info-panel">
      <div id="left-info">
        <span class="side-label">Left</span>
        <span id="left-weight">0</span> kg
      </div>
      <div id="right-info">
        <span class="side-label">Right</span>
        <span id="right-weight">0</span> kg
      </div>
    </div>
  
    <div id="balance-indicator"></div>
  
    <div id="seesaw-wrapper">
      <div id="plank"></div>
      <div id="pivot"></div>
      <div id="base"></div>
    </div>
  
  </div>

  <script src="script.js"></script>
</body>
</html>
