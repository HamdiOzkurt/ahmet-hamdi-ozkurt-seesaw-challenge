<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Seesaw Simulation</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="scene">
  
    <h1>Seesaw Simulation</h1>
  
    <div id="info-panel">
      <div id="left-info">
        <span class="side-label">Left Weight</span>
        <span id="left-weight">0.0</span> kg
      </div>
      <div id="next-info">
        <span class="side-label">Next Weight</span>
        <span id="next-weight">?</span> kg
      </div>
      <div id="right-info">
        <span class="side-label">Right Weight</span>
        <span id="right-weight">0.0</span> kg
      </div>
      <div id="angle-info">
        <span class="side-label">Tilt Angle</span>
        <span id="tilt-angle">0.0</span>°
      </div>
    </div>
  
    <div id="balance-indicator"></div>
  
    <div id="seesaw-wrapper">
      <div id="plank"></div>
      <div id="pivot"></div>
      <div id="base"></div>
    </div>
  
  </div> 
  
  <div id="btn-group">
    <button id="pause-btn">Pause</button>
    <button id="reset-btn">Reset</button>
  </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
